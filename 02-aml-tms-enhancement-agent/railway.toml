[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injects $PORT — use a shell so the variable expands at runtime
startCommand = "sh -c 'streamlit run app.py --server.port \"$PORT\" --server.address 0.0.0.0 --server.headless true'"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
