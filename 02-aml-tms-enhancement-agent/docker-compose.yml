version: "3.9"

services:
  # ── FastAPI scoring backend ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TMS_VENDOR=${TMS_VENDOR:-actimize}
      - SUPPRESS_THRESHOLD=${SUPPRESS_THRESHOLD:-85}
      - DOWNGRADE_THRESHOLD=${DOWNGRADE_THRESHOLD:-60}
      - ESCALATE_THRESHOLD=${ESCALATE_THRESHOLD:-15}
      - FRONTEND_URL=http://localhost:3000
      - ENVIRONMENT=development
    volumes:
      - .:/app
    restart: unless-stopped

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── PostgreSQL (for production state persistence) ──────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aml_tms_scoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
